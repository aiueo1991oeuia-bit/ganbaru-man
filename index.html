<script>

let stage = 1;
let maxWeight = 0;
let timerInterval;
let sexGlobal = "male";

function roundWeight(num){
  // 女性は2.5刻み、それ以外は5kg
  if(sexGlobal==="female"){
    return Math.round(num/2.5)*2.5;
  }
  return Math.round(num/5)*5;
}

function start(){

  let w = Number(document.getElementById("weight").value);
  sexGlobal = document.getElementById("sex").value;
  let goal = document.getElementById("goal").value;

  if(maxWeight === 0){
    maxWeight = roundWeight(Number(document.getElementById("max").value));
  }

  document.getElementById("max").value = maxWeight;

  let cal = (sexGlobal==="male") ? w*33 : w*30;
  if(goal==="bulk") cal += 300;
  if(goal==="cut") cal -= 300;

  let proteinDay = (sexGlobal==="male") ? w*1.6 : w*1.3;

  document.getElementById("nutrition").innerText =
    "1日の目安：タンパク質 " + Math.round(proteinDay) + "g / カロリー " + Math.round(cal) + "kcal";

  updateMenu();
  loadLog();
}

function record(success){

  let log = JSON.parse(localStorage.getItem("log") || "[]");

  log.unshift({
    date: new Date().toLocaleDateString(),
    stage,
    result: success ? "成功" : "失敗",
    max: maxWeight
  });

  localStorage.setItem("log", JSON.stringify(log));

  // --- ステージ制御 ---
  if(stage === 5){
    if(success){
      let add = (sexGlobal==="female") ? 2.5 : 5;
      maxWeight += add;
    }
    stage = 1;
  } else {
    stage += success ? 1 : -1;
  }

  if(stage < 1) stage = 1;

  updateMenu();
  loadLog();
}

function updateMenu(){

  let w;

  if(stage===1) w = roundWeight(maxWeight*0.65);
  if(stage===2) w = roundWeight(maxWeight*0.75);
  if(stage===3) w = roundWeight(maxWeight*0.85);
  if(stage===4) w = roundWeight(maxWeight*0.92);
  if(stage===5) w = roundWeight(maxWeight + ((sexGlobal==="female")?2.5:5));

  // 背中種目ローテーション
  let backList = [
    "ラットプルダウン 10回×3",
    "懸垂 8回×3",
    "シーテッドロー 10回×3"
  ];

  let back = backList[stage % backList.length];

  let text = `
Stage${stage}
ベンチ ${w}kg ${stage<=2 ? "8回×3" : "3回×3"}
・ダンベルプレス 10回×3
・トライセプス 12回×3
・${back}
`;

  document.getElementById("menu").innerText = text;

  document.getElementById("status").innerText =
    "Stage：" + stage + " / MAX：" + maxWeight + "kg";

  // 動画（種目別）
  let videos = {
    bench: "rT7DgCr-3pg",
    dumbbell: "VmB1G1K7v94",
    triceps: "2-LAMcpzODU",
    back: "CAwf7n6Luuc"
  };

  document.getElementById("video").innerHTML =
`
<p>■ベンチプレス</p>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/${videos.bench}" allowfullscreen></iframe>

<p>■ダンベルプレス</p>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/${videos.dumbbell}" allowfullscreen></iframe>

<p>■トライセプス</p>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/${videos.triceps}" allowfullscreen></iframe>

<p>■背中</p>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/${videos.back}" allowfullscreen></iframe>
`;
}

function startTimer(){

  clearInterval(timerInterval);
  let sec = (stage<=2) ? 120 : 180;

  timerInterval = setInterval(()=>{
    let m = Math.floor(sec/60);
    let s = sec%60;
    document.getElementById("timer").innerText = `休憩 ${m}:${s}`;
    sec--;
    if(sec<0){
      clearInterval(timerInterval);
      document.getElementById("timer").innerText = "スタート🔥";
    }
  },1000);
}

function loadLog(){
  let log = JSON.parse(localStorage.getItem("log") || "[]");
  let html="";
  log.forEach(l=>{
    html+=`<li>${l.date}｜Stage${l.stage}｜${l.result}｜MAX${l.max}</li>`;
  });
  document.getElementById("logList").innerHTML=html;
}

function resetLog(){
  if(confirm("ログ消す？")){
    localStorage.removeItem("log");
    loadLog();
  }
}

</script>
