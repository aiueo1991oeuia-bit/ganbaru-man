<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベンチプレス100kgチャレンジ</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold text-center mb-4">ベンチプレス100kgチャレンジ</h1>

<div class="grid gap-4 max-w-3xl mx-auto">

<div class="bg-white p-4 rounded shadow">
<select id="sex" class="border p-2 w-full mb-2 rounded">
<option value="male">男性</option>
<option value="female">女性</option>
</select>

<input id="weight" type="number" placeholder="体重(kg)" class="border p-2 w-full mb-2 rounded">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-2 w-full mb-2 rounded">

<select id="goal" class="border p-2 w-full mb-2 rounded">
<option value="bulk">増量</option>
<option value="maintain">維持</option>
<option value="cut">減量</option>
<option value="cut_strict">減量特化</option>
</select>

<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>
</div>

<div class="bg-white p-4 rounded shadow">
<p id="status" class="font-bold"></p>
<p id="nutrition" class="mt-2 whitespace-pre-line"></p>
<p id="meal" class="mt-2 whitespace-pre-line"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>

<button onclick="startTimer()" class="bg-purple-500 text-white w-full p-2 mt-3 rounded">休憩スタート</button>
<p id="timer" class="text-xl text-center mt-2 font-bold"></p>

<div id="video" class="mt-4"></div>
</div>

<div class="bg-white p-4 rounded shadow">
<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mb-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 rounded">失敗</button>
</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">ログ</h2>
<ul id="logList" class="text-sm"></ul>
<button onclick="resetLog()" class="bg-gray-400 text-white w-full p-2 mt-2 rounded">ログ削除</button>
</div>

</div>

<script>

let stage = 1;
let maxWeight = 0;
let timerInterval;

const videos = {
"ダンベルプレス":"pJgZociaUes",
"インクラインダンベル":"Ujp-saRDMEg",
"ダンベルフライ":"xDLBDkICBS8",
"インクラインベンチ":"Unc20x4ggVA",
"懸垂":"40Sq7kkUuWM",
"ラットプルダウン":"aN98D1YD00o",
"トライセプス":"wdVXHWTfC18",
"ディップス":"a_OCI-7pFBk",
"MAX":"W36C1YcI1MM"
};

const programs = {
1:["ダンベルプレス","懸垂","トライセプス"],
2:["インクラインダンベル","ラットプルダウン","ディップス"],
3:["ダンベルフライ","懸垂","トライセプス"],
4:["インクラインベンチ","ラットプルダウン","ディップス"]
};

function roundWeight(n,sex){
return sex==="female"?Math.round(n/2.5)*2.5:Math.round(n/5)*5;
}

function start(){
const w=Number(weight.value);
const m=Number(max.value);
const s=sex.value;
const g=goal.value;

maxWeight=roundWeight(m,s);
stage=1;

nutrition.innerText=`タンパク質 ${Math.round(w*1.6)}g\nカロリー ${Math.round(w*33)}kcal`;

generateMeal(g);
updateMenu();
loadLog();
}

function generateMeal(goal){

const w=Number(weight.value);
const proteinLimit=Math.round(w*0.4);
const proteinTarget=Math.round(w*1.6);

/* ★ここ修正済み（基準明確化） */
let rice="普通盛り（茶碗1杯）";
if(goal==="cut_strict") rice="小盛り（茶碗1杯の約7割）";
if(goal==="bulk") rice="大盛り（茶碗1杯の約1.2倍）";

const breakfast={
text:`おにぎり1個＋ゆで卵2個＋ギリシャヨーグルト1個
タンパク質25g`,
protein:25
};

let meals=[
{name:"鶏むね肉",p:40},
{name:"サバ",p:28},
{name:"牛もも",p:40},
{name:"豚ロース",p:32},
{name:"親子丼",p:35},
{name:"ハンバーグ",p:28}
];

let pool=[...meals];
let lunch=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
let dinner=pool[Math.floor(Math.random()*pool.length)];

function make(m){
return{
text:`${m.name}＋白米${rice}
タンパク質${Math.min(m.p,proteinLimit)}g`,
protein:Math.min(m.p,proteinLimit)
};
}

const l=make(lunch);
const d=make(dinner);

const total=breakfast.protein+l.protein+d.protein;
const shake=Math.max(0,proteinTarget-total);

meal.innerText=
`🍽 食事例

朝
${breakfast.text}

昼
${l.text}

夜
${d.text}

プロテイン補助 ${shake}g`;
}

function record(success){

const s=sex.value;

if(stage===5){
if(success){
maxWeight+=(s==="female"?2.5:5);
max.value=maxWeight;
stage=1;
}else{
stage=4;
}
}else{
if(success) stage++;
}

updateMenu();
loadLog();
}

function updateMenu(){

const s=sex.value;

let w;
if(stage===1) w=maxWeight*0.65;
if(stage===2) w=maxWeight*0.75;
if(stage===3) w=maxWeight*0.85;
if(stage===4) w=maxWeight*0.92;
if(stage===5) w=maxWeight+(s==="female"?2.5:5);

w=roundWeight(w,s);

const rest=stage<=2?"2分":"3分";

let text=
`Stage${stage===5?"（Last Stage）":stage}

アップ
ベンチ ${roundWeight(maxWeight*0.5,s)}kg 10回×2（休憩2分）

メイン
ベンチ ${w}kg ${stage===5?"1回":"3回×3"} ${stage===5?"":`（休憩${rest}）`}
`;

if(stage!==5){
let subs=programs[stage];
text+=`
補助
・${subs[0]}（休憩${rest}）
・${subs[1]}（できない人はラットプルダウン）（休憩${rest}）
・${subs[2]}（休憩${rest}）`;
}

menu.innerText=text;
status.innerText=`MAX:${maxWeight}kg Stage:${stage}`;

renderVideo();
}

function renderVideo(){

if(stage===5){
video.innerHTML=`<iframe width="100%" height="220" src="https://www.youtube.com/embed/${videos["MAX"]}"></iframe>`;
return;
}

let subs=programs[stage];

video.innerHTML=subs.map(s=>{
return `<iframe width="100%" height="220" src="https://www.youtube.com/embed/${videos[s]}"></iframe>`;
}).join("");
}

function startTimer(){
let sec=stage<=2?120:180;
clearInterval(timerInterval);

timerInterval=setInterval(()=>{
let m=Math.floor(sec/60);
let s=sec%60;
timer.innerText=`${m}:${s}`;
sec--;
},1000);
}

function loadLog(){
let log=JSON.parse(localStorage.getItem("bench_log")||"[]");
logList.innerHTML=log.map(l=>`<li>${l.date} ${l.result}</li>`).join("");
}

function resetLog(){
if(confirm("削除する？")){
localStorage.removeItem("bench_log");
loadLog();
}
}

</script>

</body>
</html>
