<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ganbaru-log</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold text-center mb-4">ganbaru-log</h1>

<div class="grid gap-4">

<!-- 入力 -->
<div class="bg-white p-4 rounded shadow">

<input id="weight" type="number" placeholder="体重(kg)" class="border p-1 w-full mb-2">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-1 w-full mb-2">

<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>

<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mt-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 mt-2 rounded">失敗</button>

</div>

<!-- 出力 -->
<div class="bg-white p-4 rounded shadow">

<p id="status"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>

<div id="video" class="mt-4"></div>

</div>

</div>

<script>

let stage = 0;
let maxWeight = 0;

function start(){
maxWeight = parseInt(document.getElementById("max").value);
stage = 0;
updateMenu();
}

function record(success){

// MAXチャレンジ処理
if(stage === 4){

if(success){
maxWeight += 5;
alert("MAX更新🔥 " + maxWeight + "kg");
stage = 0;
}else{
stage = 0;
}

}else{

if(success){
stage++;
}else{
stage--;
}

}

if(stage < 0) stage = 0;
if(stage > 4) stage = 4;

updateMenu();
}

function updateMenu(){

let w;

if(stage === 0) w = Math.round(maxWeight * 0.65);
if(stage === 1) w = Math.round(maxWeight * 0.75);
if(stage === 2) w = Math.round(maxWeight * 0.85);
if(stage === 3) w = Math.round(maxWeight * 0.92);
if(stage === 4) w = maxWeight + 5;

let text = "";

if(stage === 0){
text =
"Stage0（フォーム）\n"+
"ベンチ "+w+"kg 8回×3セット（インターバル1〜2分）\n\n"+
"補助\n"+
"・ダンベルプレス 20kg 10回×3\n"+
"・トライセプス 20kg 12回×3\n"+
"・腕立て 限界×2";
}

if(stage === 1){
text =
"Stage1（中）\n"+
"ベンチ "+w+"kg 5回×4セット（インターバル2〜3分）\n\n"+
"補助\n"+
"・インクラインプレス 22kg 10回×3\n"+
"・ディップス 自重 10回×3\n"+
"・サイドレイズ 10kg 12回×3";
}

if(stage === 2){
text =
"Stage2（重）\n"+
"ベンチ "+w+"kg 3回×3セット（インターバル3分）\n\n"+
"補助\n"+
"・ディップス +10kg 8回×3\n"+
"・ダンベルプレス 25kg 8回×3\n"+
"・プレスダウン 25kg 12回×3";
}

if(stage === 3){
text =
"Stage3（超重）\n"+
"ベンチ "+w+"kg 2回×3セット（インターバル3分）\n\n"+
"補助\n"+
"・ディップス +15kg 6回×3\n"+
"・ダンベルプレス 28kg 6回×3\n"+
"・プレスダウン 30kg 10回×3";
}

if(stage === 4){
text =
"🔥MAXチャレンジ🔥\n"+
"ベンチ "+w+"kg 1回\n\n"+
"成功でMAX更新（+5kg）";
}

// 動画（種目連動）
let videoHTML = `
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/rT7DgCr-3pg"
frameborder="0" allowfullscreen></iframe>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/2z8JmcrW-As"
frameborder="0" allowfullscreen></iframe>
`;

document.getElementById("status").innerText =
"Stage：" + stage + " / MAX：" + maxWeight + "kg";

document.getElementById("menu").innerText = text;
document.getElementById("video").innerHTML = videoHTML;

}

</script>

</body>
</html>
