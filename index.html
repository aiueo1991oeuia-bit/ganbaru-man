<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベンチプレス100kgチャレンジ</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold text-center mb-4">ベンチプレス100kgチャレンジ</h1>

<div class="grid gap-4">

<div class="bg-white p-4 rounded shadow">

<select id="sex" class="border p-1 w-full mb-2">
<option value="male">男性</option>
<option value="female">女性</option>
</select>

<input id="weight" type="number" placeholder="体重(kg)" class="border p-1 w-full mb-2">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-1 w-full mb-2">

<select id="goal" class="border p-1 w-full mb-2">
<option value="bulk">増量</option>
<option value="maintain">維持</option>
<option value="cut">減量</option>
<option value="cut_strict">減量特化</option>
</select>

<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>

</div>

<div class="bg-white p-4 rounded shadow">

<p id="status"></p>
<p id="nutrition"></p>
<p id="meal"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>

<button onclick="startTimer()" class="bg-purple-500 text-white w-full p-2 mt-3 rounded">
休憩スタート
</button>

<p id="timer" class="text-xl text-center mt-2"></p>

<div id="video" class="mt-4"></div>

</div>

<div class="bg-white p-4 rounded shadow">
<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mb-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 rounded">失敗</button>
</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">ログ</h2>
<ul id="logList"></ul>
<button onclick="resetLog()" class="bg-gray-400 text-white w-full p-2 mt-2 rounded">ログ削除</button>
</div>

</div>

<script>

let stage=1;
let maxWeight=0;

function round(num,sex){
  return sex==="female"
  ? Math.round(num/2.5)*2.5
  : Math.round(num/5)*5;
}

function start(){

  let w=Number(weight.value);
  let sex=sexEl.value;
  let goal=goalEl.value;

  maxWeight=round(Number(max.value),sex);
  stage=1;

  let cal=(sex==="male")?w*33:w*30;

  if(goal==="bulk") cal+=300;
  if(goal==="cut") cal-=300;
  if(goal==="cut_strict") cal-=500;

  let protein=(sex==="male")?w*1.6:w*1.3;

  nutrition.innerText=
  `1日の目安：タンパク質 ${Math.round(protein)}g / カロリー ${Math.round(cal)}kcal`;

  generateMeal(goal);
  updateMenu();
  loadLog();
}

function generateMeal(goal){

  let w=Number(weight.value);
  let sex=sexEl.value;

  let cal=(sex==="male")?w*33:w*30;

  if(goal==="bulk") cal+=300;
  if(goal==="cut") cal-=300;
  if(goal==="cut_strict") cal-=500;

  let proteinTarget=(sex==="male")?w*1.6:w*1.3;

  let calPerMeal=Math.round(cal/3);
  let proteinPerMeal=Math.round(proteinTarget/3);

  let rice=
    goal==="bulk"?"1.5杯":
    goal==="cut"?"0.7杯":
    goal==="cut_strict"?"0.5杯":
    "1杯";

  let carb=
    goal==="bulk"?80:
    goal==="cut"?37:
    goal==="cut_strict"?25:
    55;

  let baseMeals=[
    {name:"鶏むねソテー", p:40, f:10, baseCal:600},
    {name:"サバ定食", p:28, f:20, baseCal:600},
    {name:"牛ももステーキ", p:40, f:15, baseCal:700},
    {name:"豚ロース生姜焼き", p:32, f:25, baseCal:680},
    {name:"親子丼", p:35, f:20, baseCal:650},
    {name:"ハンバーグ", p:28, f:30, baseCal:700}
  ];

  // 減量特化は低脂質優先
  if(goal==="cut_strict"){
    baseMeals=[
      {name:"鶏むねソテー", p:40, f:10, baseCal:600},
      {name:"鶏むね照り焼き", p:38, f:12, baseCal:600},
      {name:"サバ（少量）", p:25, f:15, baseCal:500}
    ];
  }

  function makeMeal(base){

    let ratio=Math.max(
      calPerMeal/base.baseCal,
      proteinPerMeal/base.p
    );

    let kcal=Math.round(base.baseCal*ratio);
    let p=Math.round(base.p*ratio);
    let f=Math.round(base.f*ratio);

    return `${base.name}（約${Math.round(150*ratio)}g＋白米${rice}）
タンパク質${p}g 脂質${f}g 炭水化物${carb}g 約${kcal}kcal`;
  }

  let breakfast=makeMeal(baseMeals[Math.floor(Math.random()*baseMeals.length)]);
  let lunch=makeMeal(baseMeals[Math.floor(Math.random()*baseMeals.length)]);
  let dinner=makeMeal(baseMeals[Math.floor(Math.random()*baseMeals.length)]);

  let remainCal=cal-(calPerMeal*3);
  let proteinShake=Math.max(0, Math.round(remainCal/4));

  meal.innerText=
`🍽 1日の食事例

🔥目標
カロリー：約${Math.round(cal)}kcal
タンパク質：約${Math.round(proteinTarget)}g

🍳 朝
${breakfast}

🍱 昼
${lunch}

🍽 夜
${dinner}

🥤 プロテイン
約${proteinShake}g`;
}

function record(success){

  let sex=sexEl.value;

  let log=JSON.parse(localStorage.getItem("log")||"[]");

  log.unshift({
    date:new Date().toLocaleDateString(),
    stage,
    result:success?"成功":"失敗",
    max:maxWeight
  });

  localStorage.setItem("log",JSON.stringify(log));

  if(stage===5){
    if(success){
      maxWeight+=(sex==="female"?2.5:5);
      max.value=maxWeight;
    }
    stage=1;
  }else{
    stage+=success?1:-1;
  }

  if(stage<1)stage=1;

  generateMeal(goalEl.value);
  updateMenu();
  loadLog();
}

function updateMenu(){

  let sex=sexEl.value;

  let w;
  if(stage===1)w=round(maxWeight*0.65,sex);
  if(stage===2)w=round(maxWeight*0.75,sex);
  if(stage===3)w=round(maxWeight*0.85,sex);
  if(stage===4)w=round(maxWeight*0.92,sex);
  if(stage===5)w=round(maxWeight+(sex==="female"?2.5:5),sex);

  let rest=stage<=2?"2分":"3分";

  const subs=[
    ["ダンベルプレス","懸垂（できない人はラットプルダウン）","トライセプス"],
    ["インクラインダンベル","ラットプルダウン","ディップス"],
    ["ダンベルフライ","懸垂（できない人はラットプルダウン）","ケーブルプレスダウン"],
    ["インクラインベンチ","ラットプルダウン","ディップス"]
  ];

  let text=
`Stage${stage===5?"（MAX挑戦）":stage}

①アップ
ベンチ ${round(maxWeight*0.5,sex)}kg 10回×2（休憩2分）

②メイン
ベンチ ${w}kg ${stage===5?"1回":"3回×3"} ${stage===5?"":"（休憩"+rest+"）"}
`;

  if(stage!==5){
    let dumb=round(maxWeight*(stage<=2?0.2:0.3),sex);
    let s=subs[stage-1];

    text+=`
③補助
・${s[0]} ${dumb}kg 10回×3（休憩${rest}）
・${s[1]} 10回×3（休憩${rest}）
・${s[2]} ${dumb}kg 12回×3（休憩${rest}）`;
  }

  menu.innerText=text;
  status.innerText=`Stage:${stage} / MAX:${maxWeight}kg`;

  video.innerHTML=`
<iframe width="100%" height="200" src="https://www.youtube.com/embed/W36C1YcI1MM"></iframe>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/pctyhH_HYxc"></iframe>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/q2lbpPFzS-M"></iframe>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/EU5KqPW19I8"></iframe>
`;
}

function startTimer(){
  let sec=stage<=2?120:180;
  let t=setInterval(()=>{
    let m=Math.floor(sec/60);
    let s=sec%60;
    timer.innerText=`休憩 ${m}:${s}`;
    sec--;
    if(sec<0){
      clearInterval(t);
      timer.innerText="スタート🔥";
    }
  },1000);
}

function loadLog(){
  let log=JSON.parse(localStorage.getItem("log")||"[]");
  let html="";
  log.forEach(l=>{
    html+=`<li>${l.date}｜Stage${l.stage}｜${l.result}｜MAX${l.max}kg</li>`;
  });
  logList.innerHTML=html;
}

function resetLog(){
  if(confirm("ログ削除する？")){
    localStorage.removeItem("log");
    loadLog();
  }
}

const sexEl=document.getElementById("sex");
const weight=document.getElementById("weight");
const max=document.getElementById("max");
const goalEl=document.getElementById("goal");
const nutrition=document.getElementById("nutrition");
const meal=document.getElementById("meal");
const menu=document.getElementById("menu");
const status=document.getElementById("status");
const video=document.getElementById("video");
const timer=document.getElementById("timer");
const logList=document.getElementById("logList");

</script>

</body>
</html>
