<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベンチプレス100kgチャレンジ</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">
<h1 class="text-2xl font-bold text-center mb-4">ベンチプレス100kgチャレンジ</h1>

<div class="grid gap-4 max-w-3xl mx-auto">

<div class="bg-white p-4 rounded shadow">
<select id="sex" class="border p-2 w-full mb-2 rounded">
<option value="male">男性</option>
<option value="female">女性</option>
</select>

<input id="weight" type="number" placeholder="体重(kg)" class="border p-2 w-full mb-2 rounded">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-2 w-full mb-2 rounded">

<select id="goal" class="border p-2 w-full mb-2 rounded">
<option value="bulk">増量</option>
<option value="maintain">維持</option>
<option value="cut">減量</option>
<option value="cut_strict">減量特化</option>
</select>

<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>
</div>

<div class="bg-white p-4 rounded shadow">
<p id="status" class="font-bold mb-2"></p>
<p id="nutrition" class="mb-3 whitespace-pre-line"></p>
<p id="meal" class="mb-3 whitespace-pre-line"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>

<button onclick="startTimer()" class="bg-purple-500 text-white w-full p-2 mt-3 rounded">休憩スタート</button>
<p id="timer" class="text-xl text-center mt-2 font-bold"></p>

<div id="video" class="mt-4"></div>
</div>

<div class="bg-white p-4 rounded shadow">
<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mb-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 rounded">失敗</button>
</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">ログ</h2>
<ul id="logList" class="text-sm"></ul>
<button onclick="resetLog()" class="bg-gray-400 text-white w-full p-2 mt-2 rounded">ログ削除</button>
</div>

</div>

<script>
let stage = 1;
let maxWeight = 0;
let timerInterval;

const riceMap = {
  bulk: "大盛り（茶碗1杯の約1.2倍）",
  maintain: "普通（茶碗1杯）",
  cut: "少なめ（茶碗1杯の約0.7倍）",
  cut_strict: "かなり少なめ（茶碗1杯の約0.5倍）"
};

function roundWeight(num, sex){
  return sex==="female" ? Math.round(num/2.5)*2.5 : Math.round(num/5)*5;
}

function getCalories(w, sex, goal){
  let cal = sex==="male" ? w*33 : w*30;
  if(goal==="bulk") cal+=300;
  if(goal==="cut") cal-=300;
  if(goal==="cut_strict") cal-=500;
  return Math.round(cal);
}

function getProtein(w, sex){
  return Math.round(sex==="male" ? w*1.6 : w*1.3);
}

function start(){
  let w = Number(weight.value);
  let sexVal = sex.value;
  let goalVal = goal.value;

  maxWeight = roundWeight(Number(max.value), sexVal);
  stage = 1;

  nutrition.innerText =
    `1日の目安：タンパク質 ${getProtein(w, sexVal)}g / カロリー ${getCalories(w, sexVal, goalVal)}kcal`;

  generateMeal(goalVal);
  updateMenu();
  loadLog();
}

function generateMeal(goalVal){

  let w = Number(weight.value);
  let sexVal = sex.value;

  let totalCal = getCalories(w, sexVal, goalVal);
  let proteinTarget = getProtein(w, sexVal);

  let proteinLimit = Math.round(w*0.4);

  let meals = [
    {name:"鶏むね肉", p:40, f:10},
    {name:"牛もも", p:40, f:15},
    {name:"豚ロース", p:32, f:25},
    {name:"サバ", p:28, f:20},
    {name:"ハンバーグ", p:28, f:30}
  ];

  meals.sort(()=>Math.random()-0.5);

  function make(base){
    let p = Math.min(base.p, proteinLimit);
    return `${base.name} + ご飯${riceMap[goalVal]}
タンパク質${p}g`;
  }

  let breakfast = `ヨーグルト1個 + おにぎり1個 + プロテイン
タンパク質約30g`;

  let lunch = make(meals[0]);
  let dinner = make(meals[1]);

  meal.innerText =
`🍽 1日の食事例

🍳 朝
${breakfast}

🍱 昼
${lunch}

🍽 夜
${dinner}`;
}

function record(success){

  let sexVal = sex.value;

  let log = JSON.parse(localStorage.getItem("bench_log")||"[]");

  log.unshift({
    date:new Date().toLocaleDateString(),
    stage,
    result:success?"成功":"失敗",
    max:maxWeight
  });

  localStorage.setItem("bench_log",JSON.stringify(log));

  if(stage===5){
    if(success){
      maxWeight += sexVal==="female"?2.5:5;
      max.value = maxWeight;
      stage = 1;
    }else{
      stage = 4;
    }
  }else{
    if(success) stage++;
  }

  updateMenu();
  loadLog();
}

function updateMenu(){

  let sexVal = sex.value;

  let mainWeight =
    stage===1?maxWeight*0.65:
    stage===2?maxWeight*0.75:
    stage===3?maxWeight*0.85:
    stage===4?maxWeight*0.92:
    maxWeight+5;

  let rest = stage<=2?"2分":"3分";
  let dumb = roundWeight(maxWeight*(stage<=2?0.2:0.3),sexVal);

  let text =
`Stage${stage}

①アップ
ベンチ ${roundWeight(maxWeight*0.5,sexVal)}kg 10回×2（休憩2分）

②メイン
ベンチ ${roundWeight(mainWeight,sexVal)}kg ${stage===5?"1回":"3回×3"} ${stage===5?"":`（休憩${rest}）`}
`;

  if(stage!==5){
    text+=`
③補助
・ダンベルプレス ${dumb}kg 10回×3（休憩${rest}）
・懸垂（できない人はラットプルダウン）10回×3（休憩${rest}）
・トライセプス 12回×3（休憩${rest})`;
  }

  menu.innerText = text;
  status.innerText = `Stage:${stage} / MAX:${maxWeight}kg`;
}

function startTimer(){
  clearInterval(timerInterval);
  let sec = stage<=2?120:180;

  timerInterval=setInterval(()=>{
    let m=Math.floor(sec/60);
    let s=sec%60;
    timer.innerText=`休憩 ${m}:${s.toString().padStart(2,'0')}`;
    sec--;
    if(sec<0){
      clearInterval(timerInterval);
      timer.innerText="スタート🔥";
    }
  },1000);
}

function loadLog(){
  let log=JSON.parse(localStorage.getItem("bench_log")||"[]");
  logList.innerHTML = log.map(l=>`<li>${l.date}｜Stage${l.stage}｜${l.result}｜MAX${l.max}kg</li>`).join("");
}

function resetLog(){
  if(confirm("削除する？")){
    localStorage.removeItem("bench_log");
    loadLog();
  }
}
</script>

</body>
</html>
