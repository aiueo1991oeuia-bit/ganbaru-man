<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベンチプレス100kgチャレンジ</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold text-center mb-4">ベンチプレス100kgチャレンジ</h1>

<div class="grid gap-4">

<!-- 入力 -->
<div class="bg-white p-4 rounded shadow">
<input id="weight" type="number" placeholder="体重(kg)" class="border p-1 w-full mb-2">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-1 w-full mb-2">
<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>
</div>

<!-- 表示 -->
<div class="bg-white p-4 rounded shadow">
<p id="status"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>

<button onclick="startTimer()" class="bg-purple-500 text-white w-full p-2 mt-3 rounded">
休憩スタート
</button>

<p id="timer" class="text-xl text-center mt-2"></p>

<div id="video" class="mt-4"></div>
</div>

<!-- 成功失敗 -->
<div class="bg-white p-4 rounded shadow">
<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mb-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 rounded">失敗</button>
</div>

</div>

<script>

let stage = 1;
let maxWeight = 0;

function round5(n){ return Math.round(n/5)*5; }

function start(){
  maxWeight = round5(Number(document.getElementById("max").value));
  stage = 1;
  updateMenu();
}

function record(success){
  if(stage === 5){
    if(success) maxWeight += 5;
    stage = 1;
  } else {
    stage += success ? 1 : -1;
  }
  if(stage < 1) stage = 1;
  updateMenu();
}

function updateMenu(){

  let w;
  if(stage===1) w = round5(maxWeight*0.65);
  if(stage===2) w = round5(maxWeight*0.75);
  if(stage===3) w = round5(maxWeight*0.85);
  if(stage===4) w = round5(maxWeight*0.92);
  if(stage===5) w = round5(maxWeight+5);

  let label = (stage===5) ? "Last Stage（MAX挑戦）" : "Stage" + stage;
  let rest = (stage<=2) ? "2分" : "3分";

  // 🔥 Stageごとに種目変更
  let sub1, sub2, sub3;

  if(stage===1){
    sub1 = "ダンベルプレス";
    sub2 = "懸垂（できない人はラットプルダウン）";
    sub3 = "トライセプス";
  }

  if(stage===2){
    sub1 = "インクラインダンベル";
    sub2 = "ラットプルダウン";
    sub3 = "ディップス";
  }

  if(stage===3){
    sub1 = "ダンベルフライ";
    sub2 = "懸垂";
    sub3 = "ケーブルプレスダウン";
  }

  if(stage===4){
    sub1 = "インクラインベンチ";
    sub2 = "ラットプルダウン";
    sub3 = "ディップス";
  }

  if(stage===5){
    sub1 = "軽めダンベル";
    sub2 = "懸垂";
    sub3 = "トライセプス";
  }

  document.getElementById("menu").innerText =
`${label}

①アップ
ベンチ ${round5(maxWeight*0.5)}kg 10回×2

②メイン
ベンチ ${w}kg ${stage===5 ? "1回（MAX）" : "3回×3"}（休憩${rest}）

③補助
・${sub1} 10回×3
・${sub2} 10回×3
・${sub3} 12回×3`;

  document.getElementById("status").innerText =
    "Stage：" + stage + " / MAX：" + maxWeight + "kg";

  // 🔥 種目→動画マッピング
  const videoMap = {
    "ダンベルプレス":"pctyhH_HYxc",
    "インクラインダンベル":"pctyhH_HYxc",
    "ダンベルフライ":"pctyhH_HYxc",
    "インクラインベンチ":"W36C1YcI1MM",
    "懸垂":"q2lbpPFzS-M",
    "ラットプルダウン":"q2lbpPFzS-M",
    "ディップス":"EU5KqPW19I8",
    "トライセプス":"EU5KqPW19I8",
    "ケーブルプレスダウン":"EU5KqPW19I8"
  };

  function getVideo(name){
    for(let key in videoMap){
      if(name.includes(key)) return videoMap[key];
    }
  }

  let videos = [
    "W36C1YcI1MM",
    getVideo(sub1),
    getVideo(sub2),
    getVideo(sub3)
  ];

  let html = `<p class="font-bold mb-2">🎥 種目解説</p>`;

  videos.forEach(id=>{
    html += `<iframe width="100%" height="200" class="mb-3"
    src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
  });

  document.getElementById("video").innerHTML = html;
}

function startTimer(){
  let sec = (stage<=2)?120:180;
  let t=setInterval(()=>{
    let m=Math.floor(sec/60);
    let s=sec%60;
    document.getElementById("timer").innerText=`休憩 ${m}:${s}`;
    sec--;
    if(sec<0){
      clearInterval(t);
      document.getElementById("timer").innerText="スタート🔥";
    }
  },1000);
}

</script>

</body>
</html>
