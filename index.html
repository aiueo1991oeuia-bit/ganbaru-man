<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ganbaru-log</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold text-center mb-4">ganbaru-log</h1>

<div class="grid gap-4">

<div class="bg-white p-4 rounded shadow">

<select id="sex" class="border p-1 w-full mb-2">
<option value="male">男性</option>
<option value="female">女性</option>
</select>

<input id="weight" type="number" placeholder="体重(kg)" class="border p-1 w-full mb-2">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-1 w-full mb-2">

<select id="goal" class="border p-1 w-full mb-2">
<option value="bulk">増量</option>
<option value="maintain">維持</option>
<option value="cut">減量</option>
</select>

<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>
<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mt-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 mt-2 rounded">失敗</button>
<button onclick="startTimer()" class="bg-purple-500 text-white w-full p-2 mt-2 rounded">休憩スタート</button>

</div>

<div class="bg-white p-4 rounded shadow">

<p id="status"></p>
<p id="nutrition"></p>
<p id="meal"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>
<p id="rest" class="text-sm text-gray-600 mt-2"></p>

<p class="text-xs text-gray-500 mt-2">
※各Stage終了後は1〜2日休息を推奨します。<br>
疲労や筋肉の張りが強い場合は無理に行わず、休養も成長の一部です。
</p>

<p id="timer" class="text-xl font-bold text-center mt-4"></p>

<div id="video" class="mt-4"></div>

</div>

<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">📊 トレーニングログ</h2>
<ul id="logList" class="text-sm"></ul>
</div>

</div>

<div class="mt-6">
<button onclick="resetLog()" class="bg-red-600 text-white w-full p-3 rounded">
⚠️ ログを全削除
</button>
</div>

<script>

let stage = 1;
let maxWeight = 0;
let timerInterval;

function round5(num){
return Math.round(num/5)*5;
}

function start(){

let w = Number(document.getElementById("weight").value);
let sex = document.getElementById("sex").value;
let goal = document.getElementById("goal").value;

maxWeight = round5(Number(document.getElementById("max").value));
stage = 1;

let cal = (sex==="male") ? w*33 : w*30;
if(goal==="bulk") cal+=300;
if(goal==="cut") cal-=300;

let proteinDay = (sex==="male") ? w*1.6 : w*1.3;
let proteinMeal = Math.round(w*0.4);

let riceLabel="", carb=0;
if(goal==="cut"){ riceLabel="0.7杯"; carb=37; }
if(goal==="maintain"){ riceLabel="1杯"; carb=55; }
if(goal==="bulk"){ riceLabel="1.5杯"; carb=80; }

const eggCount = (goal==="bulk") ? 2 : 1;
const eggProtein = eggCount*6;
const eggFat = eggCount*5;

let meals = [
()=>{
let meat = Math.max(80, Math.round((proteinMeal-eggProtein)/0.2));
let protein = Math.round(meat*0.2)+eggProtein;
let fat = Math.round(meat*0.15)+eggFat;
let kcal = protein*4 + fat*9 + carb*4;

return `親子丼（鶏もも肉${meat}g + 卵${eggCount}個 + 白米 ${riceLabel}）
タンパク質${protein}g / 脂質${fat}g / 炭水化物${carb}g / 約${kcal}kcal`;
},
()=>{
let meat = Math.round(proteinMeal/0.2);
let protein = Math.round(meat*0.2);
let fat = Math.round(meat*0.3);
let kcal = protein*4 + fat*9 + carb*4;

return `牛丼（牛バラ肉${meat}g + 白米 ${riceLabel}）
タンパク質${protein}g / 脂質${fat}g / 炭水化物${carb}g / 約${kcal}kcal`;
}
];

document.getElementById("meal").innerText =
"食事例（1食分）：\n"+meals[Math.floor(Math.random()*2)]();

document.getElementById("nutrition").innerText =
"1日の目安：タンパク質 "+Math.round(proteinDay)+"g / カロリー "+Math.round(cal)+"kcal";

updateMenu();
loadLog();
}

function record(success){

let log = JSON.parse(localStorage.getItem("log")||"[]");

log.unshift({
date:new Date().toLocaleDateString(),
stage,
result: success?"成功":"失敗",
max:maxWeight
});

localStorage.setItem("log",JSON.stringify(log));

if(stage===5){
if(success){ maxWeight+=5; stage=1; } else { stage=1; }
}else{
if(success){stage++}else{stage--}
}

if(stage<1) stage=1;
if(stage>5) stage=5;

updateMenu();
loadLog();
}

function updateMenu(){

let w;

if(stage===1) w=round5(maxWeight*0.65);
if(stage===2) w=round5(maxWeight*0.75);
if(stage===3) w=round5(maxWeight*0.85);
if(stage===4) w=round5(maxWeight*0.92);
if(stage===5) w=round5(maxWeight+5);

let text="";

if(stage===1){
text=`Stage1
ベンチ ${w}kg 8回×3（休憩2分）
・ダンベルプレス 20kg 10回×3（休憩2分）
・トライセプス 20kg 12回×3（休憩2分）`;
}

if(stage===2){
text=`Stage2
ベンチ ${w}kg 5回×4（休憩2分）
・インクラインダンベル 22kg 10回×3（休憩2分）
・ディップス 自重 10回×3（休憩2分）`;
}

if(stage===3){
text=`Stage3
ベンチ ${w}kg 3回×3（休憩3分）
・ディップス +10kg 8回×3（休憩3分）
・ダンベルプレス 25kg 8回×3（休憩3分）`;
}

if(stage===4){
text=`Stage4
ベンチ ${w}kg 2回×3（休憩3分）
・ディップス +15kg 6回×3（休憩3分）
・プレスダウン 30kg 10回×3（休憩3分）`;
}

if(stage===5){
text=`🔥Final Stage🔥
ベンチ ${w}kg 1回（休憩3分）`;
}

document.getElementById("menu").innerText=text;

document.getElementById("rest").innerText =
(stage<=2)?"※軽め：週3〜4回OK":"※高強度：1〜2日休み";

// 🔥 動画（完全復活）
let videos={
bench:{id:"W36C1YcI1MM",title:"ベンチプレス"},
dumbbell:{id:"pctyhH_HYxc",title:"ダンベルプレス"},
dips:{id:"EU5KqPW19I8",title:"ディップス"},
triceps:{id:"RXrJXD76tSE",title:"トライセプス"}
};

let use=[];
if(stage===1){use=[videos.bench,videos.dumbbell,videos.triceps];}
if(stage===2){use=[videos.bench,videos.dumbbell,videos.dips];}
if(stage>=3){use=[videos.bench,videos.dips,videos.triceps];}

let html="<p class='text-sm font-bold mb-2'>🎥 種目別解説</p>";

use.forEach(v=>{
html+=`
<div class="mb-4">
<p class="text-sm mb-1">${v.title}</p>
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/${v.id}"
allowfullscreen></iframe>
</div>
`;
});

document.getElementById("video").innerHTML=html;

document.getElementById("status").innerText =
"Stage："+(stage===5?"Final":stage)+" / MAX："+maxWeight+"kg";
}

function startTimer(){

clearInterval(timerInterval);
let seconds=(stage<=2)?120:180;

timerInterval=setInterval(()=>{
let m=Math.floor(seconds/60);
let s=seconds%60;
document.getElementById("timer").innerText=`休憩：${m}:${s.toString().padStart(2,'0')}`;
seconds--;
if(seconds<0){
clearInterval(timerInterval);
document.getElementById("timer").innerText="スタート🔥";
}
},1000);
}

function loadLog(){

let log=JSON.parse(localStorage.getItem("log")||"[]");
let html="";
log.forEach(l=>{
html+=`<li>${l.date}｜Stage${l.stage}｜${l.result}｜MAX${l.max}kg</li>`;
});
document.getElementById("logList").innerHTML=html;
}

function resetLog(){
if(confirm("ログを全て削除しますか？")){
localStorage.removeItem("log");
loadLog();
}
}

</script>

</body>
</html>
