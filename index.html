<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベンチプレス100kgチャレンジ</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold text-center mb-4">ベンチプレス100kgチャレンジ</h1>

<div class="grid gap-4 max-w-3xl mx-auto">

<!-- 入力 -->
<div class="bg-white p-4 rounded shadow">
<select id="sex" class="border p-2 w-full mb-2 rounded">
<option value="male">男性</option>
<option value="female">女性</option>
</select>

<input id="weight" type="number" placeholder="体重(kg)" class="border p-2 w-full mb-2 rounded">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-2 w-full mb-2 rounded">

<select id="goal" class="border p-2 w-full mb-2 rounded">
<option value="bulk">増量</option>
<option value="maintain">維持</option>
<option value="cut">減量</option>
<option value="cut_strict">減量特化</option>
</select>

<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>
</div>

<!-- 状態 -->
<div class="bg-white p-4 rounded shadow">
<p id="status" class="font-bold"></p>
<p id="nutrition" class="mt-2 whitespace-pre-line"></p>
<p id="meal" class="mt-2 whitespace-pre-line"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>

<button onclick="startTimer()" class="bg-purple-500 text-white w-full p-2 mt-3 rounded">休憩スタート</button>
<p id="timer" class="text-xl text-center mt-2 font-bold"></p>

<div id="video" class="mt-4"></div>
</div>

<!-- 成功失敗 -->
<div class="bg-white p-4 rounded shadow">
<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mb-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 rounded">失敗</button>
</div>

<!-- ログ -->
<div class="bg-white p-4 rounded shadow">
<h2 class="font-bold mb-2">ログ</h2>
<ul id="logList" class="text-sm"></ul>
<button onclick="resetLog()" class="bg-gray-400 text-white w-full p-2 mt-2 rounded">ログ削除</button>
</div>

</div>

<script>

let stage = 1;
let maxWeight = 0;
let timerInterval;

function roundWeight(num, sex){
  return sex==="female"
    ? Math.round(num/2.5)*2.5
    : Math.round(num/5)*5;
}

function start(){
  const w = Number(weight.value);
  const m = Number(max.value);
  const sexVal = sex.value;
  const goalVal = goal.value;

  maxWeight = roundWeight(m, sexVal);
  stage = 1;

  nutrition.innerText =
    `タンパク質 ${Math.round(w*1.6)}g\nカロリー ${Math.round(w*33)}kcal`;

  generateMeal(goalVal);
  updateMenu();
  loadLog();
}

function generateMeal(goal){

  const w = Number(weight.value);
  const proteinLimit = Math.round(w*0.4);

  const breakfast = {
    text:`ギリシャヨーグルト200g＋プロテイン
タンパク質30g / 約250kcal`,
    protein:30
  };

  const meals = [
    {name:"鶏むね",p:40,f:10},
    {name:"サバ",p:28,f:20},
    {name:"牛もも",p:40,f:15},
    {name:"豚ロース",p:32,f:25},
    {name:"親子丼",p:35,f:20},
    {name:"ハンバーグ",p:28,f:30}
  ];

  let pool=[...meals];
  let lunch=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
  let dinner=pool[Math.floor(Math.random()*pool.length)];

  meal.innerText =
`🍽 食事例

朝
${breakfast.text}

昼
${lunch.name}

夜
${dinner.name}`;
}

function record(success){

  const sexVal = sex.value;

  if(stage===5){
    if(success){
      maxWeight += (sexVal==="female"?2.5:5);
      max.value = maxWeight;
      stage=1;
    }else{
      stage=4;
    }
  }else{
    if(success) stage++;
  }

  updateMenu();
  loadLog();
}

function updateMenu(){

  const sexVal = sex.value;

  let weightMain;
  if(stage===1) weightMain = maxWeight*0.65;
  if(stage===2) weightMain = maxWeight*0.75;
  if(stage===3) weightMain = maxWeight*0.85;
  if(stage===4) weightMain = maxWeight*0.92;
  if(stage===5) weightMain = maxWeight + (sexVal==="female"?2.5:5);

  weightMain = roundWeight(weightMain, sexVal);

  const rest = stage<=2 ? "2分" : "3分";

  menu.innerText =
`Stage${stage}

ベンチ ${weightMain}kg
休憩 ${stage===5?"なし":rest}`;

  status.innerText = `MAX:${maxWeight}kg`;

}

function startTimer(){
  let sec = stage<=2 ? 120 : 180;

  clearInterval(timerInterval);

  timerInterval = setInterval(()=>{
    let m=Math.floor(sec/60);
    let s=sec%60;
    timer.innerText=`${m}:${s}`;
    sec--;
  },1000);
}

function loadLog(){
  let log = JSON.parse(localStorage.getItem("bench_log")||"[]");
  logList.innerHTML = log.map(l=>`<li>${l.date} ${l.result}</li>`).join("");
}

function resetLog(){
  if(confirm("削除する？")){
    localStorage.removeItem("bench_log");
    loadLog();
  }
}

</script>

</body>
</html>
