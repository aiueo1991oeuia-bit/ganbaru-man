<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ganbaru-log</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold text-center mb-4">ganbaru-log</h1>

<div class="grid gap-4">

<div class="bg-white p-4 rounded shadow">

<select id="sex" class="border p-1 w-full mb-2">
<option value="male">男性</option>
<option value="female">女性</option>
</select>

<input id="weight" type="number" placeholder="体重(kg)" class="border p-1 w-full mb-2">
<input id="max" type="number" placeholder="ベンチMAX(kg)" class="border p-1 w-full mb-2">

<select id="goal" class="border p-1 w-full mb-2">
<option value="bulk">増量</option>
<option value="maintain">維持</option>
<option value="cut">減量</option>
</select>

<button onclick="start()" class="bg-blue-500 text-white w-full p-2 rounded">開始</button>
<button onclick="record(true)" class="bg-green-500 text-white w-full p-2 mt-2 rounded">成功</button>
<button onclick="record(false)" class="bg-red-500 text-white w-full p-2 mt-2 rounded">失敗</button>
<button onclick="startTimer()" class="bg-purple-500 text-white w-full p-2 mt-2 rounded">休憩スタート</button>

</div>

<div class="bg-white p-4 rounded shadow">

<p id="status"></p>
<p id="nutrition"></p>
<p id="meal"></p>
<p id="menu" class="mt-2 whitespace-pre-line"></p>
<p id="timer" class="text-xl font-bold text-center mt-4"></p>

<div id="video" class="mt-4"></div>

</div>

</div>

<script>

let stage = 0;
let maxWeight = 0;
let timerInterval;

function round5(num){
return Math.round(num/5)*5;
}

function start(){

let w = Number(document.getElementById("weight").value);
let sex = document.getElementById("sex").value;
let goal = document.getElementById("goal").value;

maxWeight = round5(Number(document.getElementById("max").value));
stage = 0;

// カロリー
let cal = (sex==="male") ? w*33 : w*30;
if(goal==="bulk") cal+=300;
if(goal==="cut") cal-=300;

// タンパク質
let proteinDay = (sex==="male") ? w*1.6 : w*1.3;
let proteinMeal = Math.round(w*0.4);

// 🍚 米量調整
let riceAmount, riceLabel, carb;

if(goal==="cut"){
riceAmount = 100;
riceLabel = "0.7杯";
carb = 37;
}
if(goal==="maintain"){
riceAmount = 150;
riceLabel = "1杯";
carb = 55;
}
if(goal==="bulk"){
riceAmount = 225;
riceLabel = "1.5杯";
carb = 80;
}

// 食事
let meals = [
()=>{
let meat = Math.round(proteinMeal/0.2);
let protein_meat = Math.round(meat*0.2);
let fat = Math.round(meat*0.15);

// 米
let protein_rice = 4;

// 合計
let protein = protein_meat + protein_rice;
let kcal = protein*4 + fat*9 + carb*4;

return `親子丼（鶏もも肉${meat}g・卵2個 + 白米 ${riceLabel}）
タンパク質${protein}g / 脂質${fat}g / 炭水化物${carb}g / 約${kcal}kcal`;
},
()=>{
let meat = Math.round(proteinMeal/0.2);
let protein_meat = Math.round(meat*0.2);
let fat = Math.round(meat*0.3);

// 米
let protein_rice = 4;

// 合計
let protein = protein_meat + protein_rice;
let kcal = protein*4 + fat*9 + carb*4;

return `牛丼（牛バラ肉${meat}g + 白米 ${riceLabel}）
タンパク質${protein}g / 脂質${fat}g / 炭水化物${carb}g / 約${kcal}kcal`;
}
];

let meal = meals[Math.floor(Math.random()*meals.length)]();

document.getElementById("nutrition").innerText =
"1日の目安：タンパク質 "+Math.round(proteinDay)+"g / カロリー "+Math.round(cal)+"kcal";

document.getElementById("meal").innerText =
"1食例：\n"+meal;

updateMenu();
}

function record(success){

if(stage===4){
if(success){
maxWeight+=5;
alert("MAX更新🔥 "+maxWeight+"kg");
stage=0;
}else{
stage=0;
}
}else{
if(success){stage++}else{stage--}
}

if(stage<0) stage=0;
if(stage>4) stage=4;

updateMenu();
}

function updateMenu(){

let w;

if(stage===0) w=round5(maxWeight*0.65);
if(stage===1) w=round5(maxWeight*0.75);
if(stage===2) w=round5(maxWeight*0.85);
if(stage===3) w=round5(maxWeight*0.92);
if(stage===4) w=round5(maxWeight+5);

let text="";

if(stage===0){
text=`Stage0
ベンチ ${w}kg 8回×3（休憩2分）
・ダンベルプレス 20kg 10回×3（休憩2分）
・トライセプス 20kg 12回×3（休憩2分）`;
}

if(stage===1){
text=`Stage1
ベンチ ${w}kg 5回×4（休憩2分）
・インクラインダンベル 22kg 10回×3（休憩2分）
・ディップス 自重 10回×3（休憩2分）`;
}

if(stage===2){
text=`Stage2
ベンチ ${w}kg 3回×3（休憩3分）
・ディップス +10kg 8回×3（休憩3分）
・ダンベルプレス 25kg 8回×3（休憩3分）`;
}

if(stage===3){
text=`Stage3
ベンチ ${w}kg 2回×3（休憩3分）
・ディップス +15kg 6回×3（休憩3分）
・プレスダウン 30kg 10回×3（休憩3分）`;
}

if(stage===4){
text=`🔥MAXチャレンジ🔥
ベンチ ${w}kg 1回（休憩3分）`;
}

// 動画
let videoHTML = `
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/7X1pKp0n8nE"></iframe>
`;

document.getElementById("status").innerText =
"Stage："+stage+" / MAX："+maxWeight+"kg";

document.getElementById("menu").innerText=text;
document.getElementById("video").innerHTML=videoHTML;

}

function startTimer(){

clearInterval(timerInterval);

let seconds = (stage<=1) ? 120 : 180;

timerInterval = setInterval(()=>{
let min = Math.floor(seconds/60);
let sec = seconds%60;

document.getElementById("timer").innerText =
`休憩：${min}:${sec.toString().padStart(2,'0')}`;

seconds--;

if(seconds<0){
clearInterval(timerInterval);
document.getElementById("timer").innerText = "スタート🔥";
}

},1000);

}

</script>

</body>
</html>
